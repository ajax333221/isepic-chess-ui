    boardui.refreshUi.params = {

    };

    boardui.refreshUi.returnVal = {};

    boardui.refreshUi.description = [];
    boardui.refreshUi.description.push(
      'Refreshes the board UI components and manages animations, sounds, and highlights.'

    boardui.refreshUi.description.push(
      'This method will:\n- Refresh the HTML of all the components (if any) to reflect the internal state of the board.\n- Finish ongoing piece animations.\n- Cancel ongoing piece dragging.\n- Unselect and unhighlight squares.\n- Cancel interactive promotion mode (if active).\n- Start the current animation (if any).\n- Highlight squares (if any).'
    );
    boardui.refreshUi.description.push('If `animationType` is a **falsy-value**, no animation will happen.');

    );
    boardui.refreshUi.description.push(
      'If `animationType` is a **negative number**, the board will be refreshed with an animation as if the next move was reverted.'
    );
    boardui.refreshUi.description.push(
      'If `playSounds` is a **truthy-value**, a sound might be played depending on multiple factors (if sound effects are not disabled in the configuration or by the browser). The sounds might get suppressed by browsers if the method was not fired from a click or keypress.'
